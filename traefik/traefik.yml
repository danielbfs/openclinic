global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: false

log:
  level: INFO

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      # Email configurado via variável de ambiente no docker-compose
      # O valor real vem do label ou da variável ACME_EMAIL
      storage: /letsencrypt/acme.json
      httpChallenge:
        # HTTP-01 challenge — funciona em qualquer VPS com porta 80 acessível
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: openclinic_proxy
  file:
    directory: /etc/traefik/dynamic
    watch: true
