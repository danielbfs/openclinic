http:
  middlewares:

    # Headers de segurança — aplicado em todos os serviços web
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    # Rate limit para webhooks de entrada (Telegram, WhatsApp, Meta, Google)
    webhook-ratelimit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # Rate limit para API geral
    api-ratelimit:
      rateLimit:
        average: 300
        burst: 100
        period: 1m
