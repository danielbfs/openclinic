# ============================================================
# Open Clinic AI — docker-compose.yml (PRODUÇÃO)
#
# Deploy via Hostinger: URL do GitHub → docker-compose.yml
# O Traefik da Hostinger (ou externo) roteia tráfego para os
# containers via labels Docker. Nenhum proxy dentro deste compose.
#
# Dev local:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://openclinic:${DB_PASSWORD:-openclinic}@db/openclinic
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  CLINIC_TIMEZONE: ${CLINIC_TIMEZONE:-America/Sao_Paulo}
  CLINIC_SLA_HOURS: ${CLINIC_SLA_HOURS:-2}
  ENVIRONMENT: production
  DOMAIN: ${DOMAIN:-localhost}

networks:
  internal:
    name: openclinic_internal

volumes:
  postgres_data:
  redis_data:

services:

  # ── BANCO DE DADOS ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: openclinic
      POSTGRES_USER: openclinic
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclinic}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclinic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── CACHE + FILA ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal

  # ── BACKEND API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "127.0.0.1:8000:8000"   # só localhost — Traefik host-mode alcança via 127.0.0.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclinic-backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`) || PathPrefix(`/health`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.openclinic-backend.tls=true"
      - "traefik.http.routers.openclinic-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclinic-backend.loadbalancer.server.url=http://127.0.0.1:8000"

  # ── FRONTEND ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # só localhost — Traefik host-mode alcança via 127.0.0.1
    environment:
      NODE_ENV: production
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclinic-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.openclinic-frontend.tls=true"
      - "traefik.http.routers.openclinic-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclinic-frontend.loadbalancer.server.url=http://127.0.0.1:3000"
      # Prioridade menor que o backend (rotas /api vão pro backend primeiro)
      - "traefik.http.routers.openclinic-frontend.priority=1"

  # ── WORKERS CELERY ───────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery_app worker --loglevel=info -Q default,followup,leads --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - redis
    networks:
      - internal
