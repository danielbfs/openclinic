# ============================================================
# Open Clinic AI — docker-compose.yml (PRODUÇÃO)
#
# Este é o ÚNICO compose file usado pela Hostinger no deploy
# via URL do GitHub. Inclui Traefik + SSL automático.
#
# Para desenvolvimento local, use:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://openclinic:${DB_PASSWORD:-openclinic}@db/openclinic
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  CLINIC_TIMEZONE: ${CLINIC_TIMEZONE:-America/Sao_Paulo}
  CLINIC_SLA_HOURS: ${CLINIC_SLA_HOURS:-2}
  ENVIRONMENT: production
  DOMAIN: ${DOMAIN:-localhost}

networks:
  proxy:
    name: openclinic_proxy
  internal:
    name: openclinic_internal

volumes:
  postgres_data:
  redis_data:
  traefik_certs:

services:

  # ── REVERSE PROXY + SSL AUTO ─────────────────────────────
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_certs:/letsencrypt
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:admin}"

  # ── BANCO DE DADOS ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: openclinic
      POSTGRES_USER: openclinic
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclinic}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclinic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── CACHE + FILA ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal

  # ── BACKEND API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=openclinic_proxy"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-localhost}`) && (PathPrefix(`/api`) || PathPrefix(`/webhooks`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.middlewares=security-headers@file"

  # ── FRONTEND ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=openclinic_proxy"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"

  # ── WORKERS CELERY ───────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery_app worker --loglevel=info -Q default,followup,leads --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      - redis
    networks:
      - internal
