name: Publish Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  # Força Node.js 24 em todas as actions enquanto os mantenedores atualizam
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/danielbfs/openclinic-backend:latest
            ghcr.io/danielbfs/openclinic-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/danielbfs/openclinic-frontend:latest
            ghcr.io/danielbfs/openclinic-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
